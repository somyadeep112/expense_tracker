<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expenses</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            background: #f5f7fa;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #1f2937;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: #d1d5db;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #374151;
            color: white;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
        }

        th {
            background: #f3f4f6;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .actions a {
            margin-right: 10px;
        }
        .active {
    background: #4f46e5;   /* purple highlight */
    color: white !important;
    font-weight: bold;
    border-radius: 8px;
}

/* optional hover improvement */
.sidebar a:hover {
    background: #374151;
    color: white;
}
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💰 Expense</h2>

    <a href="/dashboard" class="{% if active_page=='dashboard' %}active{% endif %}">📊 Dashboard</a>
    <a href="/expenses" class="{% if active_page=='expenses' %}active{% endif %}">📋 Expenses</a>
    <a href="/reports" class="{% if active_page=='reports' %}active{% endif %}">📑 Reports</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h2>Expenses</h2>
        <form method="get">
    <input type="text" name="search" placeholder="Search category...">
    <button type="submit">Search</button>
</form>
    </div>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>

        {% for e in expenses %}
        <tr>
            <td>₹ {{ e.amount }}</td>
            <td>{{ e.category }}</td>
            <td>{{ e.date }}</td>
            <td class="actions">
                <a href="/edit/{{ e.id }}">✏️</a>
                <a href="/delete/{{ e.id }}" onclick="return confirm('Delete this expense?')">❌</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
